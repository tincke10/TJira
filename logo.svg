<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="TJira — scissors logo">
  <title>TJira</title>
  <desc>A pair of scissors forming an X, the two halves in Jira brand blues.</desc>

  <!-- Half A: ojal arriba-izq → punta abajo-der -->
  <g stroke="#0052CC" fill="none" stroke-linecap="round">
    <circle cx="48" cy="72" r="22" stroke-width="14"/>
    <line x1="72" y1="89" x2="218" y2="191" stroke-width="18"/>
  </g>

  <!-- Half B: ojal abajo-izq → punta arriba-der -->
  <g stroke="#2684FF" fill="none" stroke-linecap="round">
    <circle cx="48" cy="184" r="22" stroke-width="14"/>
    <line x1="72" y1="167" x2="218" y2="65" stroke-width="18"/>
  </g>

  <!-- Pivote (tornillo central) -->
  <circle cx="128" cy="128" r="10" fill="#172B4D"/>
  <circle cx="128" cy="128" r="4" fill="#DFE1E6"/>
</svg>
